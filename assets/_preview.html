<!doctype html>
<html>
<head>
<style>
  body { margin: 40px; background: #f7f4f0; }
  .label { font-family: monospace; font-size: 12px; color: #999; margin-bottom: 8px; }
  .row { margin-bottom: 48px; }
  .dark-bg { background: #0a0805; display: inline-block; padding: 20px 24px; }
</style>
</head>
<body>
  <div class="row">
    <div class="label">logo.svg (light)</div>
    <img src="/logo.svg" width="480">
  </div>
  <div class="row">
    <div class="label">logo-dark.svg</div>
    <div class="dark-bg"><img src="/logo-dark.svg" width="480"></div>
  </div>
  <div class="row">
    <div class="label">favicon.svg — 128px / 64px / 32px</div>
    <div style="display: flex; align-items: flex-end; gap: 24px;">
      <img src="/favicon.svg" width="128" height="128" style="border: 1px solid #ddd;">
      <img src="/favicon.svg" width="64" height="64" style="border: 1px solid #ddd;">
      <img src="/favicon.svg" width="32" height="32" style="border: 1px solid #ddd;">
    </div>
  </div>
</body>
</html>
