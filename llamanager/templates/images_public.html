<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark light">
  <title>Images - llamanager</title>
  <link rel="icon" id="lm-favicon" href="/favicon-dark.svg" type="image/svg+xml">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" id="lm-theme-color" content="#201e17">

  <script>
    (function () {
      try {
        var stored = localStorage.getItem('lm-theme');
        var theme = stored || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
        document.documentElement.setAttribute('data-theme', theme);
        var fav = document.getElementById('lm-favicon');
        var tc = document.getElementById('lm-theme-color');
        if (fav) fav.href = theme === 'light' ? '/favicon.svg' : '/favicon-dark.svg';
        if (tc) tc.content = theme === 'light' ? '#f8f6f3' : '#201e17';
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..700,0..100&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap">

  <style>
    :root, [data-theme="dark"] {
      --bg-0: oklch(0.14 0.008 80); --bg-1: oklch(0.18 0.008 80);
      --bg-2: oklch(0.22 0.010 80); --bg-3: oklch(0.28 0.012 80);
      --fg-0: oklch(0.96 0.005 80); --fg-1: oklch(0.82 0.005 80);
      --fg-2: oklch(0.62 0.008 80); --fg-3: oklch(0.46 0.010 80);
      --accent: oklch(0.66 0.19 32); --accent-soft: oklch(0.66 0.19 32 / 0.14);
      --on-accent: oklch(0.14 0.008 80); --ok: oklch(0.70 0.13 155); --bad: oklch(0.62 0.18 28);
    }
    [data-theme="light"] {
      --bg-0: oklch(0.97 0.006 80); --bg-1: oklch(0.94 0.008 80);
      --bg-2: oklch(0.91 0.010 80); --bg-3: oklch(0.84 0.012 80);
      --fg-0: oklch(0.20 0.010 80); --fg-1: oklch(0.36 0.010 80);
      --fg-2: oklch(0.50 0.010 80); --fg-3: oklch(0.64 0.010 80);
      --accent: oklch(0.56 0.20 32); --accent-soft: oklch(0.56 0.20 32 / 0.10);
      --on-accent: oklch(0.97 0.006 80); --ok: oklch(0.50 0.14 155); --bad: oklch(0.52 0.20 28);
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg-0); color: var(--fg-0);
      font-family: 'Inter', system-ui, sans-serif; font-size: 0.9375rem;
      line-height: 1.5; -webkit-font-smoothing: antialiased;
    }
    code, pre, input.lm-input--mono, select.lm-input--mono {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
    }
    ::selection { background: var(--accent-soft); color: var(--fg-0); }

    /* Login overlay */
    .img-login {
      position: fixed; inset: 0; z-index: 100;
      background:
        radial-gradient(90% 60% at 50% 0%, var(--accent-soft) 0%, transparent 55%),
        radial-gradient(120% 80% at 50% 120%, var(--bg-1) 0%, transparent 60%),
        var(--bg-0);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 22px;
    }
    .img-login-box {
      width: min(360px, calc(100vw - 40px));
      display: flex; flex-direction: column; gap: 12px;
      background: var(--bg-1); border: 1px solid var(--bg-3);
      border-radius: 16px; padding: 22px;
      box-shadow: 0 16px 48px oklch(0 0 0 / 0.28);
    }
    .img-login-box input {
      width: 100%; padding: 11px 13px; background: var(--bg-0);
      border: 1px solid var(--bg-3); border-radius: 10px; color: var(--fg-0);
      font-size: 0.9375rem; font-family: 'JetBrains Mono', ui-monospace, monospace;
      transition: border-color 120ms ease;
    }
    .img-login-box input:focus { outline: 0; border-color: var(--accent); }
    .img-login-box .lm-btn--primary { padding: 11px 12px; border-radius: 10px; font-size: 0.875rem; }
    .img-login-error { color: var(--bad); font-size: 0.8125rem; min-height: 1.2em; }
    .img-login__brand {
      font-family: 'Fraunces', Georgia, serif; font-size: 1.5rem; font-weight: 400;
      font-variation-settings: 'opsz' 120, 'SOFT' 40; color: var(--fg-0);
    }
    .img-login__eyebrow {
      font-size: 0.625rem; letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--fg-3); margin-top: 4px;
    }
    .login-logo--light { display: none; }
    [data-theme="light"] .login-logo--light { display: inline; }
    [data-theme="light"] .login-logo--dark { display: none; }
    .theme-btns { display: flex; gap: 4px; }
    .theme-btns button {
      background: transparent; border: 1px solid var(--bg-3); color: var(--fg-2);
      padding: 4px 10px; font-size: 0.6875rem; letter-spacing: 0.08em;
      text-transform: uppercase; cursor: pointer;
    }
    .theme-btns button[aria-pressed="true"] { color: var(--accent); border-color: var(--accent); }

    /* Buttons + inputs (shared look with admin) */
    .lm-btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      background: var(--bg-2); border: 1px solid var(--bg-3); color: var(--fg-0);
      padding: 6px 12px; font-size: 0.8125rem; cursor: pointer; font-family: inherit;
      border-radius: 6px;
    }
    .lm-btn:hover { border-color: var(--fg-2); }
    .lm-btn--primary { background: var(--accent); color: var(--on-accent); border-color: var(--accent); }
    .lm-btn--ghost { background: transparent; }
    .lm-btn--danger { color: var(--bad); border-color: var(--bad); background: transparent; }
    .lm-btn--xs { padding: 3px 8px; font-size: 0.6875rem; }
    .lm-btn--sm { padding: 5px 10px; font-size: 0.75rem; }
    .lm-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .lm-input {
      background: var(--bg-0); border: 1px solid var(--bg-3); color: var(--fg-0);
      padding: 6px 8px; font-size: 0.8125rem; font-family: inherit;
      width: 100%; box-sizing: border-box; border-radius: 4px;
    }

    /* ---- Feed shell (mirrors /ui/images) ---- */
    .lm-img-form { display: contents; }
    .gen-shell {
      display: flex; flex-direction: column;
      height: 100dvh; padding: 12px; gap: 0; box-sizing: border-box;
    }
    .gen-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2px 10px; gap: 12px;
    }
    .gen-topbar__brand { display: flex; align-items: center; gap: 8px; }
    .gen-topbar__brand img { height: 22px; }
    .gen-topbar__brand span {
      font-size: 0.625rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--fg-3);
    }
    .gen-topbar__actions { display: flex; align-items: center; gap: 8px; }

    .gen-feed { flex: 1; overflow-y: auto; padding: 4px 2px 8px; scroll-behavior: smooth; }
    .gen-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(215px, 1fr));
      gap: 12px; align-content: start;
    }
    .gen-card {
      position: relative; aspect-ratio: 1; background: var(--bg-1);
      border: 1px solid var(--bg-3); border-radius: 10px; overflow: hidden;
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
    }
    .gen-card:hover {
      border-color: var(--fg-3); transform: translateY(-3px);
      box-shadow: 0 12px 28px oklch(0 0 0 / 0.28);
    }
    .gen-card img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      transition: transform 400ms cubic-bezier(0.2, 0.7, 0.2, 1);
    }
    .gen-card:hover img { transform: scale(1.045); }
    .gen-card__cap {
      position: absolute; left: 0; right: 0; bottom: 0; padding: 22px 10px 8px;
      font-size: 0.6875rem; line-height: 1.35; color: #fff;
      background: linear-gradient(to top, oklch(0 0 0 / 0.82), oklch(0 0 0 / 0.4) 45%, transparent);
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
      opacity: 0; transform: translateY(4px);
      transition: opacity 160ms ease, transform 160ms ease;
    }
    .gen-card:hover .gen-card__cap { opacity: 1; transform: translateY(0); }
    .gen-card--live {
      cursor: default; border-color: var(--accent);
      display: flex; flex-direction: column; justify-content: center; gap: 12px; padding: 16px;
      background: linear-gradient(110deg, var(--bg-1) 30%, var(--bg-2) 50%, var(--bg-1) 70%) 0 0 / 200% 100%;
      animation: gen-shimmer 1.4s linear infinite;
    }
    @keyframes gen-shimmer { to { background-position: -200% 0; } }
    .gen-live__phase { font-size: 0.75rem; color: var(--fg-1); text-align: center; font-variant-numeric: tabular-nums; }
    .gen-live__bar { height: 5px; background: var(--bg-3); border-radius: 3px; overflow: hidden; }
    .gen-live__fill { height: 100%; width: 0%; background: var(--accent); transition: width 250ms ease; }
    .gen-live__prompt {
      font-size: 0.6875rem; color: var(--fg-3); line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }
    .gen-live__spinner {
      width: 20px; height: 20px; margin: 0 auto;
      border: 2px solid var(--bg-3); border-top-color: var(--accent);
      border-radius: 50%; animation: gen-spin 0.8s linear infinite;
    }
    @keyframes gen-spin { to { transform: rotate(360deg); } }
    .gen-empty {
      grid-column: 1 / -1; color: var(--fg-2); text-align: center;
      font-family: 'Fraunces', 'Iowan Old Style', Georgia, serif; font-weight: 400;
      font-size: clamp(1.35rem, 3vw, 1.9rem); letter-spacing: -0.01em; line-height: 1.3;
      padding: clamp(48px, 12vh, 120px) 24px 24px;
      font-variation-settings: 'opsz' 120, 'SOFT' 40;
    }
    .gen-empty small {
      display: block; margin-top: 12px; font-family: 'Inter', system-ui, sans-serif;
      font-weight: 400; font-size: 0.9375rem; color: var(--fg-3); letter-spacing: 0;
    }
    .gen-loadmore { margin: 14px auto 4px; display: block; }

    /* Prompt dock */
    .gen-dock { flex-shrink: 0; margin-top: 10px; position: relative; }
    .gen-bar {
      display: flex; align-items: flex-end; gap: 8px;
      background: var(--bg-1); border: 1px solid var(--bg-3); border-radius: 16px;
      padding: 8px 8px 8px 10px; box-shadow: 0 6px 24px oklch(0 0 0 / 0.20);
      transition: border-color 150ms ease, box-shadow 150ms ease;
    }
    .gen-bar:focus-within { border-color: var(--accent); box-shadow: 0 8px 30px oklch(0 0 0 / 0.26); }
    .gen-modelbtn {
      flex-shrink: 0; align-self: stretch; display: flex; flex-direction: column;
      justify-content: center; gap: 1px; padding: 4px 12px; min-width: 120px; max-width: 200px;
      background: var(--bg-2); border: 1px solid var(--bg-3); border-radius: 10px;
      cursor: pointer; color: var(--fg-1); text-align: left;
    }
    .gen-modelbtn:hover { border-color: var(--fg-2); }
    .gen-modelbtn.is-open { border-color: var(--accent); }
    .gen-modelbtn__eyebrow { font-size: 0.5625rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-3); }
    .gen-modelbtn__name { font-size: 0.8125rem; color: var(--fg-0); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .gen-prompt {
      flex: 1; resize: none; min-height: 42px; max-height: 180px;
      border: none; background: transparent; color: var(--fg-0);
      font-family: inherit; font-size: 0.9375rem; line-height: 1.5; padding: 10px 4px; outline: none;
    }
    .gen-bar__actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .gen-iconbtn {
      width: 38px; height: 38px; flex-shrink: 0; display: inline-flex; align-items: center;
      justify-content: center; background: var(--bg-2); border: 1px solid var(--bg-3);
      border-radius: 10px; color: var(--fg-1); cursor: pointer; font-size: 1rem;
      transition: border-color 120ms ease, color 120ms ease;
    }
    .gen-iconbtn:hover { border-color: var(--fg-2); color: var(--fg-0); }
    .gen-generate { height: 40px; padding: 0 22px; border-radius: 10px; white-space: nowrap; font-weight: 500; }
    .gen-dock__hint { font-size: 0.6875rem; color: var(--fg-3); text-align: right; padding: 4px 6px 0; }
    .gen-error {
      margin-top: 8px; color: var(--bad); font-size: 0.8125rem;
      padding: 8px 10px; border: 1px solid var(--bad); border-radius: 6px;
      background: oklch(from var(--bad) l c h / 0.08);
    }
    .gen-refs {
      display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px;
      background: var(--bg-1); border: 1px solid var(--bg-3); border-radius: 10px; padding: 8px 10px;
    }
    .gen-refs[hidden] { display: none; }
    .gen-refs__thumbs { display: flex; flex-wrap: wrap; gap: 8px; }
    .gen-ref { position: relative; width: 56px; height: 56px; border-radius: 6px; overflow: hidden; border: 1px solid var(--bg-3); background: var(--bg-0); }
    .gen-ref img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .gen-ref__rm { position: absolute; top: 2px; right: 2px; width: 18px; height: 18px; border-radius: 50%; border: none; background: oklch(0 0 0 / 0.6); color: #fff; cursor: pointer; font-size: 0.7rem; line-height: 1; display: flex; align-items: center; justify-content: center; }
    .gen-refs__opts { display: flex; flex-wrap: wrap; gap: 14px; align-items: center; font-size: 0.75rem; color: var(--fg-2); }
    .gen-refopt { display: inline-flex; align-items: center; gap: 6px; }
    .gen-refopt input[type=range] { width: 120px; }
    .gen-refs__hint { font-size: 0.6875rem; color: var(--fg-3); margin-left: auto; }
    .gen-dock.is-dragover .gen-bar { border-color: var(--accent); border-style: dashed; }
    .gen-pop {
      position: absolute; left: 0; right: 0; bottom: calc(100% + 8px);
      background: var(--bg-1); border: 1px solid var(--bg-3); border-radius: 12px;
      padding: 14px 16px; box-shadow: 0 8px 28px oklch(0 0 0 / 0.32);
      max-height: 60vh; overflow-y: auto; z-index: 20;
    }
    .gen-pop[hidden] { display: none; }
    .gen-pop--history { padding: 8px; }
    .gen-history__item {
      display: block; width: 100%; text-align: left; padding: 8px 10px; border: none;
      background: transparent; color: var(--fg-1); cursor: pointer; border-radius: 6px;
      font-size: 0.8125rem; line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .gen-history__item:hover { background: var(--bg-2); color: var(--fg-0); }
    .gen-history__empty { color: var(--fg-3); font-size: 0.8125rem; padding: 10px; text-align: center; }
    .gen-settings__foot { grid-column: 1 / -1; display: flex; justify-content: flex-end; border-top: 1px solid var(--bg-3); margin-top: 4px; padding-top: 10px; }

    /* Composer (consumed by _image_composer.html) */
    .lm-img-composer { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 16px; }
    .lm-img-composer__head { grid-column: 1 / -1; display: flex; justify-content: space-between; align-items: baseline; }
    .lm-img-composer__title { font-size: 0.875rem; color: var(--fg-0); }
    .lm-img-composer__hint { font-size: 0.6875rem; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.1em; }
    .lm-img-field { display: flex; flex-direction: column; gap: 4px; }
    .lm-img-field__label { font-size: 0.6875rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--fg-2); }
    .lm-img-field__help { font-size: 0.6875rem; color: var(--fg-3); }
    .lm-img-overrides { grid-column: 1 / -1; display: grid; grid-template-columns: 1fr 1fr; gap: 12px 16px; }
    .lm-img-row { grid-column: 1 / -1; display: flex; gap: 12px; }
    .lm-img-seed-row { display: flex; gap: 6px; align-items: stretch; }
    .lm-img-seed-row input { flex: 1; }

    /* Lightbox */
    .gen-lightbox {
      position: fixed; inset: 0; z-index: 60; background: oklch(0 0 0 / 0.78);
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .gen-lightbox[hidden] { display: none; }
    .gen-lightbox__panel {
      display: flex; max-width: 1100px; width: 100%; max-height: 90vh;
      background: var(--bg-1); border: 1px solid var(--bg-3); border-radius: 10px; overflow: hidden;
    }
    .gen-lightbox__imgwrap {
      flex: 1; min-width: 0; background: var(--bg-0);
      display: flex; align-items: center; justify-content: center; padding: 12px;
    }
    .gen-lightbox__imgwrap img { max-width: 100%; max-height: 86vh; object-fit: contain; }
    .gen-lightbox__side {
      width: 320px; flex-shrink: 0; border-left: 1px solid var(--bg-3);
      padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px;
    }
    .gen-lb-meta__row { display: flex; gap: 8px; font-size: 0.8125rem; line-height: 1.4; }
    .gen-lb-meta__label { color: var(--fg-2); min-width: 78px; text-transform: uppercase; letter-spacing: 0.07em; font-size: 0.625rem; padding-top: 3px; }
    .gen-lb-prompt { padding: 8px 10px; background: var(--bg-0); border-left: 2px solid var(--accent); font-size: 0.8125rem; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
    .gen-lb-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: auto; padding-top: 8px; }
    .gen-lightbox__close {
      position: absolute; top: 16px; right: 20px; background: var(--bg-2);
      border: 1px solid var(--bg-3); border-radius: 6px; color: var(--fg-1);
      cursor: pointer; font-size: 1.1rem; width: 36px; height: 36px;
    }

    @media (max-width: 760px) {
      .gen-shell { padding: 8px; }
      .gen-topbar { padding-bottom: 8px; }
      .gen-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; }
      .gen-bar { flex-wrap: wrap; }
      .gen-modelbtn {
        order: -1; flex: 1 1 100%; max-width: none; flex-direction: row;
        align-items: center; justify-content: space-between; padding: 9px 12px;
      }
      .gen-prompt { flex: 1 1 55%; min-height: 40px; }
      .gen-generate { flex: 1 1 auto; height: 44px; }
      .gen-iconbtn { width: 44px; height: 44px; }
      .gen-pop { max-height: 64dvh; }
      .lm-img-composer, .lm-img-overrides { grid-template-columns: 1fr; }
      .gen-lightbox { padding: 0; }
      .gen-lightbox__panel { flex-direction: column; max-height: 100dvh; border-radius: 0; }
      .gen-lightbox__imgwrap img { max-height: 58dvh; }
      .gen-lightbox__side { width: auto; border-left: none; border-top: 1px solid var(--bg-3); max-height: 40dvh; }
      .gen-lightbox__close { top: 10px; right: 12px; }
    }
  </style>
</head>
<body>

  <!-- Login screen -->
  <div id="login-screen" class="img-login">
    <div style="text-align: center;">
      <div class="img-login__brand">llamanager</div>
      <div class="img-login__eyebrow">Image studio</div>
    </div>
    <div class="img-login-box">
      <input id="login-key" type="password" placeholder="Paste your API key" autofocus>
      <button id="login-btn" class="lm-btn lm-btn--primary" style="width: 100%;">Connect</button>
      <div id="login-error" class="img-login-error"></div>
    </div>
    <div class="theme-btns" role="group">
      <button type="button" data-theme-set="dark" aria-pressed="false">Dark</button>
      <button type="button" data-theme-set="light" aria-pressed="false">Light</button>
    </div>
  </div>

  <!-- App -->
  <form id="lm-img-composer" class="lm-img-form" autocomplete="off" style="display: none;">
    <div class="gen-shell">

      <div class="gen-topbar">
        <div class="gen-topbar__brand">
          <img src="/logo-dark.svg" alt="llamanager" class="login-logo--dark">
          <img src="/logo.svg" alt="llamanager" class="login-logo--light">
          <span>images</span>
        </div>
        <div class="gen-topbar__actions">
          <div class="theme-btns" role="group">
            <button type="button" data-theme-set="dark" aria-pressed="false">Dark</button>
            <button type="button" data-theme-set="light" aria-pressed="false">Light</button>
          </div>
        </div>
      </div>

      <div class="gen-feed" id="gen-feed">
        <div class="gen-grid" id="gen-grid">
          <p class="gen-empty" id="gen-empty">
            A blank canvas.
            <small>Describe an image below and hit Generate to begin.</small>
          </p>
        </div>
        <button type="button" id="gen-loadmore" class="lm-btn lm-btn--ghost lm-btn--sm gen-loadmore" hidden>
          Load older
        </button>
      </div>

      <div class="gen-dock">
        <div class="gen-pop" id="gen-settings" hidden>
          {% include "_image_composer.html" %}
          <div class="gen-settings__foot">
            <button id="logout-btn" type="button" class="lm-btn lm-btn--ghost lm-btn--xs">Sign out</button>
          </div>
        </div>
        <div class="gen-pop gen-pop--history" id="gen-history" hidden>
          <div id="gen-history-list"></div>
        </div>
        <div id="lm-img-error" class="gen-error" hidden></div>

        <div class="gen-refs" id="gen-refs" hidden>
          <div class="gen-refs__thumbs" id="gen-refs-thumbs"></div>
          <div class="gen-refs__opts">
            <label class="gen-refopt" id="gen-strength-wrap" hidden>
              Strength
              <input type="range" id="gen-strength" min="0" max="1" step="0.05" value="0.6">
              <span id="gen-strength-val">0.60</span>
            </label>
            <label class="gen-refopt" id="gen-keepaspect-wrap" hidden>
              <input type="checkbox" id="gen-keepaspect"> Keep reference aspect ratio
            </label>
            <span class="gen-refs__hint" id="gen-refs-hint"></span>
          </div>
        </div>
        <input type="file" id="gen-file" accept="image/png,image/jpeg,image/webp" multiple hidden>

        <div class="gen-bar">
          <button type="button" class="gen-modelbtn" id="gen-modelbtn" title="Model & settings">
            <span class="gen-modelbtn__eyebrow">Model · ⚙</span>
            <span class="gen-modelbtn__name" id="gen-modelbtn-name">—</span>
          </button>
          <textarea id="lm-img-prompt" class="gen-prompt" rows="1"
                    placeholder="Describe the image you want… (⌘/Ctrl+Enter to generate)"></textarea>
          <div class="gen-bar__actions">
            <button type="button" class="gen-iconbtn" id="gen-attach" title="Attach reference image" hidden>📎</button>
            <button type="button" class="gen-iconbtn" id="gen-history-btn" title="Prompt history">🕘</button>
            <button type="button" class="gen-iconbtn" id="lm-img-cancel" title="Cancel" hidden>✕</button>
            <button type="submit" class="lm-btn lm-btn--primary gen-generate" id="lm-img-generate">Generate</button>
          </div>
        </div>
        <div class="gen-dock__hint" id="gen-hint">&nbsp;</div>
      </div>

    </div>
  </form>

  <!-- Lightbox -->
  <div class="gen-lightbox" id="gen-lightbox" hidden>
    <button type="button" class="gen-lightbox__close" id="gen-lb-close" aria-label="Close">✕</button>
    <div class="gen-lightbox__panel">
      <div class="gen-lightbox__imgwrap"><img id="gen-lb-img" src="" alt=""></div>
      <div class="gen-lightbox__side">
        <div id="gen-lb-meta"></div>
        <p class="gen-lb-prompt" id="gen-lb-prompt" hidden></p>
        <div class="gen-lb-actions" id="gen-lb-actions"></div>
      </div>
    </div>
  </div>

  <script>
    window.LM_IMAGES_CFG = {
      imageModels: {{ image_models_json | safe }},
      profiles: {{ profiles_json | safe }},
      enginesSchema: {{ engines_schema_json | safe }},
      enginesCaps: {{ engines_caps_json | safe }},
      defaultModel: {{ default_image_model | tojson }},
      defaultProfile: {{ default_image_profile | tojson }},
      apiKey: "",
      galleryUrl: "/images/gallery",
      fileUrlPrefix: "/images/file/",
      generationsUrl: "/v1/images/generations",
      storageKey: "lm-images-api-key"
    };
  </script>

  <script>
  // Theme toggle (standalone — no base.html here).
  (function() {
    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      try { localStorage.setItem('lm-theme', theme); } catch (e) {}
      const fav = document.getElementById('lm-favicon');
      const tc = document.getElementById('lm-theme-color');
      if (fav) fav.href = theme === 'light' ? '/favicon.svg' : '/favicon-dark.svg';
      if (tc) tc.content = theme === 'light' ? '#f8f6f3' : '#201e17';
      document.querySelectorAll('.theme-btns button').forEach(b => {
        b.setAttribute('aria-pressed', b.dataset.themeSet === theme ? 'true' : 'false');
      });
    }
    document.querySelectorAll('.theme-btns button').forEach(b => {
      b.addEventListener('click', () => setTheme(b.dataset.themeSet));
    });
    setTheme(document.documentElement.getAttribute('data-theme') || 'dark');
  })();
  </script>

  <script>
  // Login → boot the feed with the captured key.
  (function() {
    const cfg = window.LM_IMAGES_CFG;
    const login = document.getElementById('login-screen');
    const app = document.getElementById('lm-img-composer');
    const keyInput = document.getElementById('login-key');
    const loginBtn = document.getElementById('login-btn');
    const loginErr = document.getElementById('login-error');

    function showApp() { login.style.display = 'none'; app.style.display = ''; }
    function showLogin() { app.style.display = 'none'; login.style.display = 'flex'; keyInput.focus(); }

    async function tryConnect(key) {
      const r = await fetch(cfg.galleryUrl + '?limit=1', { headers: {'Authorization': 'Bearer ' + key} });
      if (r.status === 401 || r.status === 403) throw new Error('Invalid API key');
      if (!r.ok) throw new Error('Could not reach server (' + r.status + ')');
      return r;
    }

    loginBtn.addEventListener('click', async () => {
      const k = (keyInput.value || '').trim();
      loginErr.textContent = '';
      if (!k) { loginErr.textContent = 'Paste a key first.'; return; }
      try {
        await tryConnect(k);
        try { localStorage.setItem(cfg.storageKey, k); } catch (e) {}
        cfg.apiKey = k; showApp(); bootFeed();
      } catch (e) { loginErr.textContent = e.message; }
    });
    keyInput.addEventListener('keydown', e => { if (e.key === 'Enter') loginBtn.click(); });

    window.__lmShowLogin = showLogin;

    (async () => {
      let stored = '';
      try { stored = localStorage.getItem(cfg.storageKey) || ''; } catch (e) {}
      if (!stored) return;
      try { await tryConnect(stored); cfg.apiKey = stored; showApp(); bootFeed(); } catch (e) {}
    })();
  })();

  // Feed logic — same UX as /ui/images, but every image/gallery/generation
  // request carries the bearer in cfg.apiKey, and gallery PNGs are fetched
  // as blobs (the file endpoint is bearer-gated, so no direct <img src>).
  function bootFeed() {
    const cfg = window.LM_IMAGES_CFG;
    if (bootFeed._done) return; bootFeed._done = true;
    const $ = (id) => document.getElementById(id);
    const HISTORY_KEY = "lm_img_prompt_history";
    const AUTH = () => ({"Authorization": "Bearer " + cfg.apiKey});
    const state = { nextBefore: null, inFlight: false, abort: null, seenUrls: new Set(), refs: [] };

    const modelSel = $("lm-img-model"), profileSel = $("lm-img-profile"), overrides = $("lm-img-overrides");
    const promptEl = $("lm-img-prompt"), seedEl = $("lm-img-seed"), seedDice = $("lm-img-seed-dice"), nEl = $("lm-img-n");
    const form = $("lm-img-composer"), submitBtn = $("lm-img-generate"), cancelBtn = $("lm-img-cancel");
    const errorEl = $("lm-img-error"), engineHint = $("lm-img-engine-hint");
    const grid = $("gen-grid"), emptyEl = $("gen-empty"), loadMore = $("gen-loadmore");
    const modelBtn = $("gen-modelbtn"), modelBtnName = $("gen-modelbtn-name");
    const settingsPop = $("gen-settings"), historyPop = $("gen-history");
    const historyBtn = $("gen-history-btn"), historyList = $("gen-history-list"), hintEl = $("gen-hint");
    const lightbox = $("gen-lightbox"), lbImg = $("gen-lb-img"), lbMeta = $("gen-lb-meta");
    const lbPrompt = $("gen-lb-prompt"), lbActions = $("gen-lb-actions");
    const dock = document.querySelector(".gen-dock");
    const refsWrap = $("gen-refs"), refsThumbs = $("gen-refs-thumbs"), refsHint = $("gen-refs-hint");
    const attachBtn = $("gen-attach"), fileInput = $("gen-file");
    const strengthWrap = $("gen-strength-wrap"), strengthEl = $("gen-strength"), strengthVal = $("gen-strength-val");
    const keepAspWrap = $("gen-keepaspect-wrap"), keepAspEl = $("gen-keepaspect");
    let liveCard = null;

    function shortName(id) { const p = id.split("/"); return p[p.length - 1]; }
    // Bearer-gated PNG → object URL, cached on the item to avoid refetch.
    async function authObjectUrl(item) {
      if (item._blobUrl) return item._blobUrl;
      const r = await fetch(item.url, {headers: AUTH()});
      if (!r.ok) throw new Error(String(r.status));
      item._blobUrl = URL.createObjectURL(await r.blob());
      return item._blobUrl;
    }

    // ---- Settings / model ----
    function populateModelDropdown() {
      modelSel.innerHTML = "";
      if (!cfg.imageModels.length) {
        const o = document.createElement("option"); o.value = ""; o.textContent = "(no image models)"; o.disabled = true;
        modelSel.appendChild(o); modelBtnName.textContent = "no models"; return;
      }
      cfg.imageModels.forEach(m => {
        const o = document.createElement("option"); o.value = m.model_id; o.dataset.engine = m.engine;
        o.textContent = `${shortName(m.model_id)}  ·  ${m.engine}`; modelSel.appendChild(o);
      });
      if (cfg.defaultModel && cfg.imageModels.some(m => m.model_id === cfg.defaultModel)) modelSel.value = cfg.defaultModel;
    }
    function currentEngine() { const o = modelSel.selectedOptions[0]; return o ? o.dataset.engine : null; }
    function updateModelBtn() { modelBtnName.textContent = modelSel.value ? shortName(modelSel.value) : "pick model"; }
    function populateProfileDropdown(preferred) {
      profileSel.innerHTML = "";
      const mid = modelSel.value;
      const none = document.createElement("option"); none.value = ""; none.textContent = "(use engine defaults)"; profileSel.appendChild(none);
      cfg.profiles.filter(p => p.model === mid).forEach(p => {
        const o = document.createElement("option"); o.value = p.name; o.textContent = p.name; profileSel.appendChild(o);
      });
      if (preferred && cfg.profiles.some(p => p.model === mid && p.name === preferred)) profileSel.value = preferred;
    }
    function renderOverrides() {
      const engine = currentEngine();
      overrides.innerHTML = "";
      if (engineHint) engineHint.textContent = engine ? `engine: ${engine}` : "";
      if (!engine || !cfg.enginesSchema[engine]) return;
      const profile = cfg.profiles.find(p => p.name === profileSel.value && p.model === modelSel.value);
      const pf = profile ? (profile.fields || {}) : {};
      cfg.enginesSchema[engine].forEach(f => {
        const wrap = document.createElement("div"); wrap.className = "lm-img-field";
        const label = document.createElement("label"); label.className = "lm-img-field__label"; label.textContent = f.label; wrap.appendChild(label);
        const placeholder = pf[f.key] != null ? String(pf[f.key]) : (f.default != null ? String(f.default) : "");
        let input;
        if (f.kind === "select") {
          input = document.createElement("select"); input.className = "lm-input lm-input--mono";
          const blank = document.createElement("option"); blank.value = "";
          blank.textContent = placeholder ? `— inherit (${placeholder}) —` : "— inherit —"; input.appendChild(blank);
          (f.options || []).forEach(o => { const op = document.createElement("option"); op.value = o; op.textContent = o; input.appendChild(op); });
        } else {
          input = document.createElement("input"); input.className = "lm-input lm-input--mono";
          input.type = (f.kind === "int" || f.kind === "float") ? "number" : "text";
          if (f.kind === "int") input.step = "1"; if (f.kind === "float") input.step = "any";
          input.placeholder = placeholder || "";
        }
        input.name = f.key; input.dataset.kind = f.kind; input.setAttribute("form", "lm-img-composer");
        wrap.appendChild(input);
        if (f.help) { const h = document.createElement("span"); h.className = "lm-img-field__help"; h.textContent = f.help; wrap.appendChild(h); }
        overrides.appendChild(wrap);
      });
    }
    modelSel.addEventListener("change", () => { updateModelBtn(); populateProfileDropdown(); renderOverrides(); applyCaps(); });
    profileSel.addEventListener("change", renderOverrides);
    if (seedDice) seedDice.addEventListener("click", () => { seedEl.value = String(Math.floor(Math.random() * 4294967295)); });

    // ---- Popovers ----
    function closePops() { settingsPop.hidden = true; historyPop.hidden = true; modelBtn.classList.remove("is-open"); }
    modelBtn.addEventListener("click", (e) => {
      e.stopPropagation(); const willOpen = settingsPop.hidden; closePops();
      settingsPop.hidden = !willOpen; modelBtn.classList.toggle("is-open", willOpen);
    });
    historyBtn.addEventListener("click", (e) => {
      e.stopPropagation(); const willOpen = historyPop.hidden; closePops();
      if (willOpen) { renderHistory(); historyPop.hidden = false; }
    });
    document.addEventListener("click", (e) => {
      if (!e.target.closest(".gen-pop") && !e.target.closest("#gen-modelbtn") && !e.target.closest("#gen-history-btn")) closePops();
    });

    // ---- Prompt history ----
    function getHistory() { try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]"); } catch { return []; } }
    function pushHistory(p) { if (!p) return; let h = getHistory().filter(x => x !== p); h.unshift(p); h = h.slice(0, 50); try { localStorage.setItem(HISTORY_KEY, JSON.stringify(h)); } catch {} }
    function renderHistory() {
      const h = getHistory(); historyList.innerHTML = "";
      if (!h.length) { const e = document.createElement("div"); e.className = "gen-history__empty"; e.textContent = "No prompts yet."; historyList.appendChild(e); return; }
      h.forEach(p => {
        const b = document.createElement("button"); b.type = "button"; b.className = "gen-history__item"; b.textContent = p; b.title = p;
        b.addEventListener("click", () => { promptEl.value = p; autosize(); closePops(); promptEl.focus(); });
        historyList.appendChild(b);
      });
    }

    // ---- Reference images ----
    function caps() { return (cfg.enginesCaps && cfg.enginesCaps[currentEngine()]) || {ref_images_max: 0}; }
    function applyCaps() {
      const c = caps(); const max = c.ref_images_max || 0;
      attachBtn.hidden = max < 1;
      if (state.refs.length > max) state.refs = state.refs.slice(0, max);
      strengthWrap.hidden = !c.strength;
      keepAspWrap.hidden = !c.keep_original_aspect;
      if (c.strength && c.strength_default != null && !strengthEl.dataset.touched) {
        strengthEl.value = String(c.strength_default); strengthVal.textContent = (+c.strength_default).toFixed(2);
      }
      renderRefs();
    }
    function renderRefs() {
      const c = caps(); const max = c.ref_images_max || 0;
      refsThumbs.innerHTML = "";
      state.refs.forEach((r, i) => {
        const cell = document.createElement("div"); cell.className = "gen-ref";
        const img = document.createElement("img"); img.src = r.dataUrl; cell.appendChild(img);
        const rm = document.createElement("button"); rm.type = "button"; rm.className = "gen-ref__rm"; rm.textContent = "✕"; rm.title = "Remove";
        rm.addEventListener("click", () => { state.refs.splice(i, 1); renderRefs(); });
        cell.appendChild(rm); refsThumbs.appendChild(cell);
      });
      refsHint.textContent = state.refs.length ? `${state.refs.length}/${max} image${max > 1 ? "s" : ""}` : "";
      refsWrap.hidden = state.refs.length === 0;
    }
    function addRefDataUrl(dataUrl, name) {
      const c = caps(); const max = c.ref_images_max || 0;
      if (max < 1) return false;
      if (state.refs.length >= max) { showError(`This engine accepts at most ${max} reference image${max > 1 ? "s" : ""}.`); return false; }
      state.refs.push({dataUrl, name: name || "image"}); renderRefs(); return true;
    }
    function addFiles(fileList) {
      const c = caps(); if ((c.ref_images_max || 0) < 1) return;
      clearError();
      Array.from(fileList || []).forEach(f => {
        if (!/^image\/(png|jpeg|webp)$/.test(f.type)) { showError("Reference images must be PNG, JPEG or WebP."); return; }
        const reader = new FileReader(); reader.onload = () => addRefDataUrl(reader.result, f.name); reader.readAsDataURL(f);
      });
    }
    attachBtn.addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", () => { addFiles(fileInput.files); fileInput.value = ""; });
    strengthEl.addEventListener("input", () => { strengthEl.dataset.touched = "1"; strengthVal.textContent = (+strengthEl.value).toFixed(2); });
    ["dragenter", "dragover"].forEach(ev => dock.addEventListener(ev, (e) => { if ((caps().ref_images_max || 0) < 1) return; e.preventDefault(); dock.classList.add("is-dragover"); }));
    ["dragleave", "drop"].forEach(ev => dock.addEventListener(ev, (e) => { if (ev === "drop" && e.dataTransfer && e.dataTransfer.files.length) { e.preventDefault(); addFiles(e.dataTransfer.files); } dock.classList.remove("is-dragover"); }));
    promptEl.addEventListener("paste", (e) => {
      const items = (e.clipboardData && e.clipboardData.items) || [];
      const imgs = Array.from(items).filter(it => it.kind === "file" && it.type.startsWith("image/")).map(it => it.getAsFile());
      if (imgs.length) { e.preventDefault(); addFiles(imgs); }
    });

    // ---- Feed ----
    function cardFor(item) {
      const div = document.createElement("div"); div.className = "gen-card"; div.dataset.url = item.url;
      authObjectUrl(item).then(url => {
        const img = document.createElement("img"); img.loading = "lazy"; img.src = url; div.appendChild(img);
      }).catch(() => {});
      const sc = item.sidecar || {};
      if (sc.prompt) { const cap = document.createElement("div"); cap.className = "gen-card__cap"; cap.textContent = sc.prompt; div.appendChild(cap); }
      div.addEventListener("click", () => openLightbox(item));
      return div;
    }
    function appendItems(items) {
      items.forEach(it => { if (state.seenUrls.has(it.url)) return; state.seenUrls.add(it.url); grid.appendChild(cardFor(it)); });
      updateEmpty();
    }
    function prependItems(items) {
      const anchor = liveCard ? liveCard.nextSibling : grid.firstChild;
      items.forEach(it => { if (state.seenUrls.has(it.url)) return; state.seenUrls.add(it.url); grid.insertBefore(cardFor(it), anchor); });
      updateEmpty();
    }
    function updateEmpty() { emptyEl.hidden = !!grid.querySelector(".gen-card") || !!liveCard; }

    async function fetchGallery({reset=false} = {}) {
      const params = new URLSearchParams({limit: "60"});
      if (!reset && state.nextBefore != null) params.set("before", String(state.nextBefore));
      const r = await fetch(`${cfg.galleryUrl}?${params.toString()}`, {headers: AUTH()});
      if (!r.ok) throw new Error(`gallery list failed: ${r.status}`);
      return r.json();
    }
    async function loadInitial() {
      try { const p = await fetchGallery({reset: true}); appendItems(p.items); state.nextBefore = p.next_before; loadMore.hidden = state.nextBefore == null; }
      catch (e) { showError(`Could not load gallery: ${e.message}`); }
    }
    loadMore.addEventListener("click", async () => {
      try { const p = await fetchGallery({reset: false}); appendItems(p.items); state.nextBefore = p.next_before; loadMore.hidden = state.nextBefore == null; }
      catch (e) { showError(`Could not load more: ${e.message}`); }
    });

    // ---- Lightbox ----
    function openLightbox(item) {
      const sc = item.sidecar || {};
      lbImg.src = ""; authObjectUrl(item).then(url => { lbImg.src = url; }).catch(() => {});
      lbMeta.innerHTML = "";
      const rows = [
        ["Model", sc.model_id || sc.model || ""], ["Profile", sc.profile || ""], ["Engine", sc.engine || ""],
        ["Size", (sc.width && sc.height) ? `${sc.width}×${sc.height}` : ""],
        ["Steps", sc.steps != null ? String(sc.steps) : ""], ["Guidance", sc.guidance != null ? String(sc.guidance) : ""],
        ["Seed", sc.seed != null ? String(sc.seed) : ""], ["Duration", sc.duration_s != null ? `${(+sc.duration_s).toFixed(1)} s` : ""],
        ["Saved", item.mtime ? new Date(item.mtime * 1000).toLocaleString() : ""],
      ];
      rows.forEach(([k, v]) => {
        if (!v) return;
        const r = document.createElement("div"); r.className = "gen-lb-meta__row";
        const l = document.createElement("span"); l.className = "gen-lb-meta__label"; l.textContent = k;
        const val = document.createElement("span"); val.textContent = v; r.appendChild(l); r.appendChild(val); lbMeta.appendChild(r);
      });
      lbPrompt.hidden = !sc.prompt; lbPrompt.textContent = sc.prompt || "";
      lbActions.innerHTML = "";
      const mkBtn = (label, fn) => { const b = document.createElement("button"); b.type = "button"; b.className = "lm-btn lm-btn--ghost lm-btn--xs"; b.textContent = label; b.addEventListener("click", fn); lbActions.appendChild(b); };
      // Download: reuse the already-fetched blob URL.
      authObjectUrl(item).then(url => {
        const dl = document.createElement("a"); dl.className = "lm-btn lm-btn--ghost lm-btn--xs"; dl.textContent = "Download";
        dl.href = url; dl.download = item.name || "image.png"; lbActions.insertBefore(dl, lbActions.firstChild);
      }).catch(() => {});
      if (sc.prompt) mkBtn("Reuse prompt", () => { promptEl.value = sc.prompt; autosize(); closeLightbox(); promptEl.focus(); });
      if (sc.seed != null) mkBtn("Reuse seed", () => { seedEl.value = String(sc.seed); closeLightbox(); });
      if ((caps().ref_images_max || 0) > 0) mkBtn("Use as reference", async () => {
        try {
          const r = await fetch(item.url, {headers: AUTH()});
          const blob = await r.blob();
          const reader = new FileReader();
          reader.onload = () => { if (addRefDataUrl(reader.result, item.name)) closeLightbox(); };
          reader.readAsDataURL(blob);
        } catch (e) { showError("Could not load that image as a reference."); }
      });
      lightbox.hidden = false;
    }
    function closeLightbox() { lightbox.hidden = true; lbImg.src = ""; }
    $("gen-lb-close").addEventListener("click", closeLightbox);
    lightbox.addEventListener("click", (e) => { if (e.target === lightbox) closeLightbox(); });
    document.addEventListener("keydown", (e) => { if (e.key === "Escape") { closeLightbox(); closePops(); } });

    // ---- Generation ----
    function showError(msg) { errorEl.hidden = false; errorEl.textContent = msg; }
    function clearError() { errorEl.hidden = true; errorEl.textContent = ""; }
    function collectOverrides() {
      const out = {};
      overrides.querySelectorAll("input, select").forEach(el => {
        const v = (el.value || "").trim(); if (v === "") return;
        const kind = el.dataset.kind;
        if (kind === "int") out[el.name] = parseInt(v, 10); else if (kind === "float") out[el.name] = parseFloat(v); else out[el.name] = v;
      });
      return out;
    }
    function buildRequestBody() {
      const body = { model: modelSel.value, prompt: promptEl.value.trim(),
        n: Math.max(1, parseInt(nEl.value || "1", 10) || 1), stream: true, response_format: "b64_json" };
      if (profileSel.value) body.profile = profileSel.value;
      if (seedEl.value !== "") body.seed = parseInt(seedEl.value, 10);
      const o = collectOverrides();
      if (o.image_size) body.size = o.image_size;
      if (o.image_steps != null) body.steps = o.image_steps;
      if (o.image_guidance != null) body.guidance = o.image_guidance;
      if (o.image_seed != null && body.seed == null) body.seed = o.image_seed;
      if (o.image_model_type) body.model_type = o.image_model_type;
      if (o.image_editing_scheduler) body.editing_scheduler = o.image_editing_scheduler;
      if (state.refs.length) {
        const c = caps();
        body.images = state.refs.map(r => r.dataUrl);
        if (c.strength) body.strength = parseFloat(strengthEl.value);
        if (c.keep_original_aspect && keepAspEl.checked) body.keep_original_aspect = true;
      }
      return body;
    }
    function makeLiveCard(prompt) {
      const div = document.createElement("div"); div.className = "gen-card gen-card--live";
      div.innerHTML = `<div class="gen-live__spinner"></div><div class="gen-live__phase">Queued…</div>
        <div class="gen-live__bar"><div class="gen-live__fill"></div></div><div class="gen-live__prompt"></div>`;
      div.querySelector(".gen-live__prompt").textContent = prompt;
      grid.insertBefore(div, grid.firstChild); emptyEl.hidden = true; return div;
    }
    function updateLive(txt, pct) { if (!liveCard) return; liveCard.querySelector(".gen-live__phase").textContent = txt; if (pct != null) liveCard.querySelector(".gen-live__fill").style.width = `${pct}%`; }
    function removeLive() { if (liveCard) { liveCard.remove(); liveCard = null; } updateEmpty(); }
    function setBusy(busy) { state.inFlight = busy; submitBtn.disabled = busy; cancelBtn.hidden = !busy; hintEl.innerHTML = busy ? "Generating — you can keep browsing the feed." : "&nbsp;"; }
    cancelBtn.addEventListener("click", () => { if (state.abort) state.abort.abort(); });

    const stage = { phase: "", pos: -1, step: null, total: null };
    function renderStage() {
      let txt = "Sending…", pct = null;
      if (stage.phase === "queued") txt = stage.pos > 0 ? `Queued · ${stage.pos} ahead` : (stage.pos === 0 ? "Next in line…" : "Queued…");
      else if (stage.phase === "swapping_model") txt = "Loading model…";
      else if (stage.phase === "running") { if (stage.step != null && stage.total != null) { txt = `Step ${stage.step} / ${stage.total}`; if (stage.total > 0) pct = Math.round(100 * stage.step / stage.total); } else txt = "Generating…"; }
      else if (stage.phase === "saving") { txt = "Saving…"; pct = 100; }
      else if (stage.phase) txt = stage.phase;
      updateLive(txt, pct);
      if (state.inFlight) hintEl.textContent = (pct != null ? `${txt} · ${pct}%` : txt);
    }
    function handleSseBlock(block) {
      let event = "message", data = "";
      block.split("\n").forEach(line => {
        if (!line) return;
        if (line.startsWith(":")) {
          const b = line.slice(1).trim();
          if (b.startsWith("status=")) { stage.phase = b.slice(7); if (stage.phase !== "queued") stage.pos = -1; renderStage(); }
          else if (b.startsWith("queue_pos=")) { const n = parseInt(b.slice(10), 10); if (!isNaN(n)) stage.pos = n; renderStage(); }
          else if (b.startsWith("step=")) { const m = b.slice(5).match(/^(\d+)\s*\/\s*(\d+)$/); if (m) { stage.step = +m[1]; stage.total = +m[2]; stage.phase = "running"; renderStage(); } }
          return;
        }
        if (line.startsWith("event:")) event = line.slice(6).trim();
        else if (line.startsWith("data:")) data += line.slice(5).trim();
      });
      if (!data) return;
      let payload; try { payload = JSON.parse(data); } catch { return; }
      if (event === "error" || payload.error) {
        const msg = (payload.error && (payload.error.message || payload.error)) || payload.message || JSON.stringify(payload);
        showError(msg);
      } else { stage.phase = "saving"; renderStage(); refreshFront(); }
    }
    async function refreshFront() {
      try {
        const r = await fetch(`${cfg.galleryUrl}?limit=12`, {headers: AUTH()});
        if (!r.ok) return;
        const p = await r.json();
        const fresh = p.items.filter(it => !state.seenUrls.has(it.url));
        if (fresh.length) prependItems(fresh);
      } catch (e) { console.warn("front refresh failed", e); }
    }
    async function generate() {
      clearError(); closePops();
      if (!modelSel.value) { showError("Pick a model first."); return; }
      if (!promptEl.value.trim()) { showError("Prompt is empty."); return; }
      const promptText = promptEl.value.trim(); pushHistory(promptText);
      setBusy(true); stage.phase = ""; stage.pos = -1; stage.step = null; stage.total = null;
      liveCard = makeLiveCard(promptText); updateLive("Sending…", 0); $("gen-feed").scrollTop = 0;
      const body = buildRequestBody(); const ctrl = new AbortController(); state.abort = ctrl;
      try {
        const r = await fetch(cfg.generationsUrl, { method: "POST",
          headers: { "Content-Type": "application/json", ...AUTH() }, body: JSON.stringify(body), signal: ctrl.signal });
        if (!r.ok) { const t = await r.text(); throw new Error(`HTTP ${r.status}: ${t.slice(0, 240)}`); }
        const reader = r.body.getReader(); const decoder = new TextDecoder(); let buf = "";
        while (true) {
          const {done, value} = await reader.read(); if (done) break;
          buf += decoder.decode(value, {stream: true}); let idx;
          while ((idx = buf.indexOf("\n\n")) !== -1) { handleSseBlock(buf.slice(0, idx)); buf = buf.slice(idx + 2); }
        }
      } catch (e) { if (e.name !== "AbortError") showError(`Generation failed: ${e.message}`); }
      finally { setBusy(false); state.abort = null; removeLive(); }
    }
    form.addEventListener("submit", (ev) => { ev.preventDefault(); generate(); });
    promptEl.addEventListener("keydown", (e) => { if ((e.metaKey || e.ctrlKey) && e.key === "Enter") { e.preventDefault(); generate(); } });
    function autosize() { promptEl.style.height = "auto"; promptEl.style.height = Math.min(promptEl.scrollHeight, 180) + "px"; }
    promptEl.addEventListener("input", autosize);

    // Sign out (logout button lives inside the settings popover).
    const logoutBtn = $("logout-btn");
    if (logoutBtn) logoutBtn.addEventListener("click", () => {
      try { localStorage.removeItem(cfg.storageKey); } catch (e) {}
      cfg.apiKey = ""; if (window.__lmShowLogin) window.__lmShowLogin();
    });

    // ---- Init ----
    populateModelDropdown();
    if (modelSel.options.length) { updateModelBtn(); populateProfileDropdown(cfg.defaultProfile); renderOverrides(); applyCaps(); }
    loadInitial(); autosize();
  }
  </script>
</body>
</html>
