<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark light">
  <title>Chat - llamanager</title>

  <script>
    (function () {
      try {
        var stored = localStorage.getItem('lm-theme');
        var theme = stored || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..700,0..100&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap">

  <style>
    :root,
    [data-theme="dark"] {
      --bg-0: oklch(0.14 0.008 80);
      --bg-1: oklch(0.18 0.008 80);
      --bg-2: oklch(0.22 0.010 80);
      --bg-3: oklch(0.28 0.012 80);
      --fg-0: oklch(0.96 0.005 80);
      --fg-1: oklch(0.82 0.005 80);
      --fg-2: oklch(0.62 0.008 80);
      --fg-3: oklch(0.46 0.010 80);
      --accent: oklch(0.66 0.19 32);
      --accent-soft: oklch(0.66 0.19 32 / 0.14);
      --on-accent: oklch(0.14 0.008 80);
      --ok: oklch(0.70 0.13 155);
      --bad: oklch(0.62 0.18 28);
    }
    [data-theme="light"] {
      --bg-0: oklch(0.97 0.006 80);
      --bg-1: oklch(0.94 0.008 80);
      --bg-2: oklch(0.91 0.010 80);
      --bg-3: oklch(0.84 0.012 80);
      --fg-0: oklch(0.20 0.010 80);
      --fg-1: oklch(0.36 0.010 80);
      --fg-2: oklch(0.50 0.010 80);
      --fg-3: oklch(0.64 0.010 80);
      --accent: oklch(0.56 0.20 32);
      --accent-soft: oklch(0.56 0.20 32 / 0.10);
      --on-accent: oklch(0.97 0.006 80);
      --ok: oklch(0.50 0.14 155);
      --bad: oklch(0.52 0.20 28);
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg-0);
      color: var(--fg-0);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 0.9375rem;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    code, pre { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    ::selection { background: var(--accent-soft); color: var(--fg-0); }

    .chat-shell {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .chat-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 0;
      border-bottom: 1px solid var(--bg-2);
      flex-shrink: 0;
    }
    .chat-brand {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 1.125rem;
      font-weight: 400;
      font-variation-settings: 'opsz' 96, 'SOFT' 30;
      color: var(--fg-0);
    }
    .chat-status {
      font-size: 0.6875rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 2px;
      border: 1px solid var(--bg-3);
      color: var(--fg-2);
    }
    .chat-status--ok { color: var(--ok); border-color: var(--ok); }
    .chat-status--bad { color: var(--bad); border-color: var(--bad); }

    .chat-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--bg-2);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .chat-controls label {
      font-size: 0.6875rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--fg-2);
    }
    .chat-controls select,
    .chat-controls input[type="text"] {
      background: transparent;
      border: 0;
      border-bottom: 1px solid var(--bg-3);
      padding: 4px 6px;
      font: inherit;
      font-size: 0.8125rem;
      color: var(--fg-0);
    }
    .chat-controls select:focus,
    .chat-controls input[type="text"]:focus {
      outline: 0;
      border-bottom-color: var(--accent);
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 0;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .chat-msg {
      display: flex;
      gap: 12px;
    }
    .chat-msg--user { flex-direction: row-reverse; }
    .chat-msg-badge {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.6875rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .chat-msg-badge--user { background: var(--accent-soft); color: var(--accent); }
    .chat-msg-badge--ai { background: var(--bg-2); color: var(--fg-2); }
    .chat-msg-text {
      flex: 1;
      min-width: 0;
      font-size: 0.9375rem;
      line-height: 1.6;
      color: var(--fg-1);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .chat-input-area {
      padding: 14px 0 20px;
      border-top: 1px solid var(--bg-2);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    .chat-input-area textarea {
      flex: 1;
      resize: none;
      background: transparent;
      border: 0;
      border-bottom: 1px solid var(--bg-3);
      padding: 10px 2px;
      font: inherit;
      font-size: 0.9375rem;
      color: var(--fg-0);
      line-height: 1.5;
      max-height: 150px;
      overflow-y: auto;
    }
    .chat-input-area textarea:focus { outline: 0; border-bottom-color: var(--accent); }
    .chat-input-area textarea::placeholder { color: var(--fg-3); }
    .chat-btn {
      display: inline-flex;
      align-items: center;
      padding: 9px 18px;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--on-accent);
      background: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 2px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .chat-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .chat-btn--ghost {
      background: transparent;
      color: var(--fg-1);
      border-color: var(--bg-3);
    }

    .chat-empty {
      color: var(--fg-3);
      font-style: italic;
      padding: 40px 0;
      text-align: center;
      font-size: 0.875rem;
    }

    /* Login overlay */
    .chat-login {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 24px;
    }
    .chat-login-box {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .chat-login-box input {
      background: transparent;
      border: 0;
      border-bottom: 1px solid var(--bg-3);
      padding: 10px 2px;
      font: inherit;
      font-size: 0.9375rem;
      color: var(--fg-0);
      width: 100%;
    }
    .chat-login-box input:focus { outline: 0; border-bottom-color: var(--accent); }
    .chat-login-box input::placeholder { color: var(--fg-3); }
    .chat-login-error {
      font-size: 0.8125rem;
      color: var(--bad);
      display: none;
    }

    @media (max-width: 640px) {
      .chat-shell { padding: 0 16px; }
    }
  </style>
</head>
<body>

  {# Login screen #}
  <div id="login-screen" class="chat-login">
    <div style="text-align: center;">
      <div class="chat-brand" style="font-size: 1.375rem; margin-bottom: 6px;">llamanager</div>
      <div style="font-size: 0.6875rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-2);">chat</div>
    </div>
    <div class="chat-login-box">
      <input id="login-key" type="password" placeholder="Paste your API key" autofocus>
      <button id="login-btn" class="chat-btn" style="width: 100%; justify-content: center;">Connect</button>
      <div id="login-error" class="chat-login-error"></div>
    </div>
  </div>

  {# Chat screen (hidden until authenticated) #}
  <div id="chat-screen" class="chat-shell" style="display: none;">
    <div class="chat-header">
      <span class="chat-brand">llamanager</span>
      <span id="chat-status" class="chat-status">connecting</span>
      <span id="chat-model" style="font-size: 0.75rem; color: var(--fg-2);"></span>
      <button id="chat-logout" class="chat-btn chat-btn--ghost" style="margin-left: auto; padding: 4px 10px; font-size: 0.6875rem;">Sign out</button>
    </div>

    <div class="chat-controls">
      <div style="display: flex; align-items: center; gap: 6px;">
        <label>System</label>
        <input id="chat-system" type="text" value="You are a helpful assistant." style="min-width: 220px; max-width: 400px;">
      </div>
      <button id="chat-clear" class="chat-btn chat-btn--ghost" style="margin-left: auto; padding: 4px 10px; font-size: 0.6875rem;">Clear</button>
    </div>

    <div id="chat-messages" class="chat-messages">
      <div id="chat-empty" class="chat-empty">Send a message to start chatting.</div>
    </div>

    <div class="chat-input-area">
      <textarea id="chat-input" rows="1" placeholder="Type a message..." disabled></textarea>
      <button id="chat-send" class="chat-btn" disabled>Send</button>
    </div>
  </div>

<script>
(function () {
  var loginScreen = document.getElementById('login-screen');
  var chatScreen = document.getElementById('chat-screen');
  var loginKey = document.getElementById('login-key');
  var loginBtn = document.getElementById('login-btn');
  var loginError = document.getElementById('login-error');
  var statusEl = document.getElementById('chat-status');
  var modelEl = document.getElementById('chat-model');
  var logoutBtn = document.getElementById('chat-logout');
  var messagesEl = document.getElementById('chat-messages');
  var inputEl = document.getElementById('chat-input');
  var sendBtn = document.getElementById('chat-send');
  var clearBtn = document.getElementById('chat-clear');
  var systemEl = document.getElementById('chat-system');
  var emptyEl = document.getElementById('chat-empty');

  var apiKey = '';
  var messages = [];
  var streaming = false;
  var statusPoll = null;

  // --- Auth ---

  function tryConnect(key) {
    loginBtn.disabled = true;
    loginBtn.textContent = 'Connecting...';
    loginError.style.display = 'none';

    fetch('/v1/models', {
      headers: { 'Authorization': 'Bearer ' + key }
    }).then(function (r) {
      if (r.status === 401) throw new Error('Invalid API key.');
      if (!r.ok) throw new Error('Server error (' + r.status + ').');
      return r.json();
    }).then(function () {
      apiKey = key;
      try { localStorage.setItem('lm-chat-key', key); } catch (e) {}
      loginScreen.style.display = 'none';
      chatScreen.style.display = 'flex';
      inputEl.disabled = false;
      sendBtn.disabled = false;
      inputEl.focus();
      pollStatus();
      statusPoll = setInterval(pollStatus, 5000);
    }).catch(function (err) {
      loginError.textContent = err.message;
      loginError.style.display = 'block';
      loginBtn.disabled = false;
      loginBtn.textContent = 'Connect';
    });
  }

  loginBtn.addEventListener('click', function () {
    var key = loginKey.value.trim();
    if (key) tryConnect(key);
  });
  loginKey.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') {
      var key = loginKey.value.trim();
      if (key) tryConnect(key);
    }
  });

  // Auto-login from localStorage
  try {
    var saved = localStorage.getItem('lm-chat-key');
    if (saved) tryConnect(saved);
  } catch (e) {}

  logoutBtn.addEventListener('click', function () {
    apiKey = '';
    messages = [];
    try { localStorage.removeItem('lm-chat-key'); } catch (e) {}
    if (statusPoll) clearInterval(statusPoll);
    chatScreen.style.display = 'none';
    loginScreen.style.display = 'flex';
    loginKey.value = '';
    loginError.style.display = 'none';
    loginBtn.disabled = false;
    loginBtn.textContent = 'Connect';
    messagesEl.innerHTML = '';
    var empty = document.createElement('div');
    empty.id = 'chat-empty';
    empty.className = 'chat-empty';
    empty.textContent = 'Send a message to start chatting.';
    messagesEl.appendChild(empty);
    emptyEl = empty;
  });

  // --- Status polling ---

  function pollStatus() {
    fetch('/health').then(function (r) { return r.json(); }).then(function (d) {
      if (d.state === 'running') {
        statusEl.textContent = 'running';
        statusEl.className = 'chat-status chat-status--ok';
        inputEl.disabled = false;
        sendBtn.disabled = streaming;
      } else {
        statusEl.textContent = d.state || 'stopped';
        statusEl.className = 'chat-status chat-status--bad';
        if (!streaming) {
          inputEl.disabled = true;
          sendBtn.disabled = true;
        }
      }
    }).catch(function () {
      statusEl.textContent = 'offline';
      statusEl.className = 'chat-status chat-status--bad';
    });
  }

  // --- Chat ---

  function autoResize() {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 150) + 'px';
  }
  inputEl.addEventListener('input', autoResize);

  function renderMessage(role, content, isStreaming) {
    var isUser = role === 'user';
    var div = document.createElement('div');
    div.className = 'chat-msg' + (isUser ? ' chat-msg--user' : '');

    var badge = document.createElement('div');
    badge.className = 'chat-msg-badge ' + (isUser ? 'chat-msg-badge--user' : 'chat-msg-badge--ai');
    badge.textContent = isUser ? 'You' : 'AI';

    var bubble = document.createElement('div');
    bubble.className = 'chat-msg-text';
    bubble.textContent = content || '';
    if (isStreaming && !content) {
      bubble.style.color = 'var(--fg-3)';
      bubble.textContent = '...';
    }

    div.appendChild(badge);
    div.appendChild(bubble);
    return { el: div, bubble: bubble };
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function send() {
    var text = inputEl.value.trim();
    if (!text || streaming) return;

    if (emptyEl) { emptyEl.remove(); emptyEl = null; }

    messages.push({ role: 'user', content: text });
    var userMsg = renderMessage('user', text);
    messagesEl.appendChild(userMsg.el);

    inputEl.value = '';
    autoResize();
    scrollToBottom();

    streaming = true;
    sendBtn.disabled = true;
    sendBtn.textContent = '...';

    var assistantMsg = renderMessage('assistant', '', true);
    messagesEl.appendChild(assistantMsg.el);
    scrollToBottom();

    var body = {
      model: 'any',
      stream: true,
      messages: []
    };
    var sys = systemEl.value.trim();
    if (sys) body.messages.push({ role: 'system', content: sys });
    for (var i = 0; i < messages.length; i++) {
      body.messages.push({ role: messages[i].role, content: messages[i].content });
    }

    var headers = {
      'Authorization': 'Bearer ' + apiKey,
      'Content-Type': 'application/json'
    };

    var fullContent = '';

    fetch('/v1/chat/completions', {
      method: 'POST',
      headers: headers,
      body: JSON.stringify(body)
    }).then(function (resp) {
      if (!resp.ok) {
        return resp.text().then(function (t) { throw new Error('HTTP ' + resp.status + ': ' + t); });
      }
      var reader = resp.body.getReader();
      var decoder = new TextDecoder();
      var buffer = '';

      function read() {
        return reader.read().then(function (result) {
          if (result.done) { finish(); return; }
          buffer += decoder.decode(result.value, { stream: true });
          var lines = buffer.split('\n');
          buffer = lines.pop();
          for (var i = 0; i < lines.length; i++) {
            var line = lines[i].trim();
            if (!line || line.startsWith(':')) continue;
            if (!line.startsWith('data: ')) continue;
            var data = line.slice(6);
            if (data === '[DONE]') { finish(); return; }
            try {
              var parsed = JSON.parse(data);
              var delta = parsed.choices && parsed.choices[0] && parsed.choices[0].delta;
              if (delta && delta.content) {
                fullContent += delta.content;
                assistantMsg.bubble.textContent = fullContent;
                assistantMsg.bubble.style.color = 'var(--fg-1)';
                scrollToBottom();
              }
            } catch (e) {}
          }
          return read();
        });
      }
      return read();
    }).catch(function (err) {
      assistantMsg.bubble.textContent = 'Error: ' + err.message;
      assistantMsg.bubble.style.color = 'var(--bad)';
      finish();
    });

    function finish() {
      if (fullContent) {
        messages.push({ role: 'assistant', content: fullContent });
      }
      streaming = false;
      sendBtn.disabled = false;
      sendBtn.textContent = 'Send';
      scrollToBottom();
    }
  }

  sendBtn.addEventListener('click', send);
  inputEl.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  clearBtn.addEventListener('click', function () {
    messages = [];
    messagesEl.innerHTML = '';
    var empty = document.createElement('div');
    empty.id = 'chat-empty';
    empty.className = 'chat-empty';
    empty.textContent = 'Send a message to start chatting.';
    messagesEl.appendChild(empty);
    emptyEl = empty;
  });
})();
</script>
</body>
</html>
